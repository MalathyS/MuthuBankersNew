<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>நிர்வாகி | முத்து பேங்கர்ஸ்</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--maroon:#5A0000;--maroon-d:#2B0000;--gold:#C8960C;--gold-b:#F0C020;--parch:#FDF3DC;--parch-m:#F5E6C0;}
body{font-family:'Noto Sans Tamil',sans-serif;background:linear-gradient(170deg,#FDF3DC 0%,#F5E6C0 45%,#EDD898 75%,#F5E6C0 100%);min-height:100vh;}
.admin-header{background:linear-gradient(180deg,#2B0000,#5A0000);border-bottom:3px solid var(--gold);padding:18px 0;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.3);position:sticky;top:0;z-index:100;}
.admin-header h1{color:var(--gold-b);font-size:1.5rem;font-weight:900;margin:0;}
.admin-header p{color:rgba(255,245,200,.7);font-size:.8rem;margin:2px 0 0;}
.admin-tabs{display:flex;background:white;border-bottom:3px solid var(--gold);position:sticky;top:72px;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.admin-tab{flex:1;padding:14px 8px;text-align:center;background:none;border:none;cursor:pointer;font-family:'Noto Sans Tamil',sans-serif;font-size:.92rem;font-weight:700;color:var(--maroon);border-bottom:3px solid transparent;transition:background .2s,border-color .2s;margin-bottom:-3px;}
.admin-tab:hover{background:var(--parch-m);}
.admin-tab.active{border-bottom-color:var(--gold);background:var(--parch);color:var(--maroon-d);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.admin-card{background:white;border-radius:16px;border:1.5px solid rgba(200,150,12,.25);padding:28px;box-shadow:0 4px 20px rgba(60,20,0,.08);margin-bottom:24px;}
.admin-card-title{color:var(--maroon);font-weight:800;font-size:1.05rem;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.banner-box{background:white;border-radius:12px;border:2px solid rgba(200,150,12,.3);padding:10px;transition:.25s;overflow:hidden;}
.banner-box:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.15);}
.banner-box img{width:100%;height:140px;object-fit:cover;border-radius:8px;display:block;}
.delete-btn{background:#dc3545;color:white;border:none;border-radius:6px;}
.upload-btn{background:linear-gradient(135deg,var(--maroon-d),var(--maroon));color:white;border:none;font-weight:700;border-radius:8px;padding:10px 24px;transition:.2s;}
.upload-btn:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(90,0,0,.35);}
.review-admin-card{background:white;border-radius:14px;border:1.5px solid rgba(200,150,12,.2);padding:20px;height:100%;box-shadow:0 2px 12px rgba(60,20,0,.06);position:relative;overflow:hidden;transition:transform .2s;}
.review-admin-card:hover{transform:translateY(-3px);}
.review-admin-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;}
.review-admin-card.approved::before{background:linear-gradient(90deg,#198754,#20c997);}
.review-admin-card.pending::before{background:linear-gradient(90deg,#ffc107,#fd7e14);}
.rev-admin-name{color:var(--maroon);font-size:.95rem;}
.rev-admin-stars{color:var(--gold);font-size:1.1rem;margin:6px 0;}
.rev-admin-text{color:#555;font-size:.88rem;line-height:1.65;margin:10px 0 6px;font-style:italic;}
.rev-admin-date{color:#aaa;font-size:.75rem;}
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px;}
.filter-btn{padding:6px 18px;border-radius:50px;border:1.5px solid rgba(200,150,12,.35);background:white;color:var(--maroon);font-weight:600;font-size:.82rem;cursor:pointer;transition:.2s;font-family:'Noto Sans Tamil',sans-serif;}
.filter-btn:hover,.filter-btn.active{background:var(--maroon);color:white;border-color:var(--maroon);}
.stats-strip{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px;}
.stat-pill{background:white;border:1.5px solid rgba(200,150,12,.25);border-radius:50px;padding:10px 20px;display:flex;align-items:center;gap:8px;box-shadow:0 2px 8px rgba(60,20,0,.06);}
.stat-pill .num{font-size:1.4rem;font-weight:900;color:var(--maroon);}
.stat-pill .lbl{font-size:.75rem;color:#888;}
</style>
</head>
<body>
<div class="admin-header">
  <h1>⚙️ முத்து பேங்கர்ஸ் – நிர்வாக பலகை</h1>
  <p>Muthu Bankers Admin Panel</p>
</div>
<div class="admin-tabs">
  <button class="admin-tab active" onclick="switchTab('banners',this)">🖼️ பேனர்கள்</button>
  <button class="admin-tab" onclick="switchTab('reviews',this)">⭐ வாடிக்கையாளர் கருத்துகள்</button>
</div>
<div class="container py-4">
  <!-- BANNERS TAB -->
  <div id="tab-banners" class="tab-panel active">
    <div class="admin-card">
      <div class="admin-card-title">📤 புதிய பேனர் பதிவேற்று</div>
      <input type="file" id="fileInput" class="form-control mb-3" multiple accept="image/*">
      <button onclick="uploadBanners()" class="upload-btn btn"><i class="bi bi-cloud-upload me-2"></i>பேனர் பதிவேற்று</button>
    </div>
    <div class="admin-card">
      <div class="admin-card-title">🖼️ பதிவேற்றப்பட்ட பேனர்கள்</div>
      <div id="bannerList" class="row g-3"></div>
    </div>
  </div>
  <!-- REVIEWS TAB -->
  <div id="tab-reviews" class="tab-panel">
    <div class="stats-strip" id="revStats"></div>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterReviews('all',this)">அனைத்தும்</button>
      <button class="filter-btn" onclick="filterReviews('pending',this)">⏳ நிலுவையில்</button>
      <button class="filter-btn" onclick="filterReviews('approved',this)">✅ அங்கீகரிக்கப்பட்டவை</button>
      <button class="btn btn-sm ms-auto" style="background:var(--maroon);color:white;border-radius:8px" onclick="loadAdminReviews()"><i class="bi bi-arrow-clockwise"></i> புதுப்பி</button>
    </div>
    <div id="adminReviewList" class="row g-3">
      <p class="text-muted text-center col-12">ஏற்றப்படுகிறது...</p>
    </div>
  </div>
</div>
<script src="script.js"></script>
<script>
function switchTab(name,btn){
  document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.admin-tab').forEach(function(b){b.classList.remove('active');});
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='reviews') loadAdminReviews();
}
var _allReviewData=[];
function filterReviews(type,btn){
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderAdminReviews(_allReviewData,type);
}
var _origLoad=loadAdminReviews;
loadAdminReviews=async function(){
  var container=document.getElementById('adminReviewList');
  if(!container)return;
  container.innerHTML='<p class="text-muted text-center col-12 py-4">ஏற்றப்படுகிறது...</p>';
  var result=await client.from('reviews').select('*').order('created_at',{ascending:false});
  if(result.error){console.error(result.error);return;}
  _allReviewData=result.data||[];
  var total=_allReviewData.length;
  var approved=_allReviewData.filter(function(r){return r.approved;}).length;
  var pending=total-approved;
  var avgRat=total?(_allReviewData.reduce(function(s,r){return s+r.rating;},0)/total).toFixed(1):'—';
  var stats=document.getElementById('revStats');
  if(stats)stats.innerHTML=
    pill(total,'மொத்தம்','📋')+pill(approved,'அங்கீகரிக்கப்பட்டவை','✅')+
    pill(pending,'நிலுவையில்','⏳')+pill(avgRat,'சராசரி மதிப்பீடு','⭐');
  var activeFilter=(document.querySelector('.filter-btn.active')||{}).textContent||'';
  var type=activeFilter.includes('நிலுவை')?'pending':activeFilter.includes('அங்கீகரி')?'approved':'all';
  renderAdminReviews(_allReviewData,type);
};
function pill(num,lbl,icon){
  return '<div class="stat-pill"><span class="num">'+num+'</span><span class="lbl">'+icon+' '+lbl+'</span></div>';
}
function renderAdminReviews(data,type){
  var container=document.getElementById('adminReviewList');
  if(!container)return;
  var filtered=data.filter(function(r){
    if(type==='pending')return!r.approved;
    if(type==='approved')return r.approved;
    return true;
  });
  container.innerHTML='';
  if(!filtered.length){container.innerHTML='<p class="text-muted text-center col-12 py-4">கருத்துகள் இல்லை</p>';return;}
  filtered.forEach(function(r){
    var stars='⭐'.repeat(r.rating)+'☆'.repeat(5-r.rating);
    var badge=r.approved?'<span class="badge bg-success">✅ அங்கீகரிக்கப்பட்டது</span>':'<span class="badge bg-warning text-dark">⏳ நிலுவையில்</span>';
    var actBtn=!r.approved?'<button class="btn btn-success btn-sm flex-fill" onclick="approveReview('+r.id+')">✅ அங்கீகரி</button>':'<button class="btn btn-outline-secondary btn-sm flex-fill" onclick="unapproveReview('+r.id+')">⛔ மறை</button>';
    var div=document.createElement('div');
    div.className='col-md-6 col-lg-4';
    div.innerHTML='<div class="review-admin-card '+(r.approved?'approved':'pending')+'">'+
      '<div class="d-flex justify-content-between align-items-center mb-2"><strong class="rev-admin-name">'+r.name+'</strong>'+badge+'</div>'+
      '<div class="rev-admin-stars">'+stars+'</div>'+
      '<p class="rev-admin-text">&ldquo;'+r.review_text+'&rdquo;</p>'+
      '<small class="rev-admin-date">'+new Date(r.created_at).toLocaleDateString('ta-IN')+'</small>'+
      '<div class="rev-admin-actions mt-3 d-flex gap-2">'+actBtn+
      '<button class="btn btn-danger btn-sm flex-fill" onclick="deleteReview('+r.id+')">🗑️ நீக்கு</button></div></div>';
    container.appendChild(div);
  });
}
</script>
</body>
</html>
